<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zerbaib Dashboard</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="toolbar">
        <input id="title" type="text" placeholder="Title" />
        <input id="url" type="text" placeholder="https://example.com" style="width:320px" />
        <select id="folderSelect" style="padding:8px;border:1px solid #cbd5e1;border-radius:6px;background:white"></select>
        <button id="add">Add</button>
        <input id="newFolder" type="text" placeholder="New folder" style="width:140px" />
        <button id="createFolder" class="secondary">Create Folder</button>
        <button id="clear" class="secondary">Clear All</button>
    </div>

    <div id="foldersContainer"></div>

    <footer>
        Made with ❤️ by Zerbaib | © 2026<br />
        This website is hosted on my self server, and it respects EU and American law.
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
